<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題管理アプリ v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>課題管理アプリ v2</h1>
            <p class="subtitle">優先度と進捗をスマートに管理</p>
        </header>

        <section class="add-task-section">
            <h2>新しい課題を追加</h2>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-name">課題名 <span class="required">*</span></label>
                    <input type="text" id="task-name" required placeholder="例：プログラミング課題1">
                </div>
                
                <div class="form-group">
                    <label for="task-deadline">締切日 <span class="required">*</span></label>
                    <input type="date" id="task-deadline" required>
                </div>
                
                <div class="form-group">
                    <label for="task-submission">提出物</label>
                    <input type="text" id="task-submission" placeholder="例：レポート（PDF）、ソースコード">
                </div>

                <div class="form-group">
                    <label for="task-priority">優先度</label>
                    <select id="task-priority">
                        <option value="high">高 (優先して取り組む)</option>
                        <option value="medium" selected>中 (通常)</option>
                        <option value="low">低 (後回しでも可)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="task-memo">メモ</label>
                    <textarea id="task-memo" rows="3" placeholder="課題に関する補足や、参考URLなどのメモ..."></textarea>
                </div>

                <button type="submit" class="btn-submit">課題を追加する</button>
            </form>
        </section>

        <section class="task-list-section">
            <div class="task-list-header">
                <h2>課題一覧</h2>
                <div class="filter-group">
                    <label class="filter-label">
                        <input type="checkbox" id="filter-unsubmitted" checked>
                        未提出のみ表示
                    </label>
                </div>
            </div>
            <div id="task-list" class="task-list">
                <!-- 課題アイテムがここにJSで追加されます -->
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
